<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scorecard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230F1923'/><circle cx='32' cy='26' r='13' fill='%23F5F0E8'/><rect x='30' y='37' width='4' height='20' rx='2' fill='%23E8B84B'/><polygon points='34,37 44,30 34,23' fill='%23E8B84B'/></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0F1923;
      --card:         #1C2733;
      --card-alt:     #243040;
      --border:       #2E3D4F;
      --border-light: #3A4F63;
      --gold:         #E8B84B;
      --text:         #F0EDE8;
      --text-muted:   #7A8FA3;
      --red:          #E05555;
      --red-dim:      rgba(224,85,85,0.12);
      --green:        #4DB87A;
      --green-dim:    rgba(77,184,122,0.12);
      --blue:         #5BA3E0;
      --radius:       12px;
      --shadow:       0 4px 28px rgba(0,0,0,0.35);
    }

    html, body { height: 100%; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }

    #loader {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; transition: opacity 0.5s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }
    .loader-ball {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--text);
      animation: bounce 1s ease-in-out infinite;
    }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
    .loader-text { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; }
    .loader-sub  { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; }

    #app { min-height: 100vh; padding-bottom: 60px; }

    header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 16px 24px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 10;
    }
    .header-icon { font-size: 1.4rem; }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    .header-date { font-size: .75rem; color: var(--text-muted); margin-left: auto; }

    .mode-bar { display: flex; gap: 10px; padding: 20px 20px 0; max-width: 860px; margin: 0 auto; }
    .mode-btn {
      flex: 1; padding: 13px 8px;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--card); color: var(--text-muted);
      font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .2s; text-align: center;
    }
    .mode-btn:hover { border-color: var(--gold); color: var(--gold); }
    .mode-btn.active { background: var(--gold); border-color: var(--gold); color: #0F1923; }

    main { max-width: 860px; margin: 0 auto; padding: 20px; }

    .card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden; margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .card-header {
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .card-title { font-size: 1rem; font-weight: 700; }
    .card-par   { font-size: .78rem; color: var(--text-muted); }

    .holes-grid {
      display: grid; grid-template-columns: repeat(9, 1fr);
      gap: 1px; background: var(--border); padding: 1px;
    }
    .hole-cell {
      background: var(--card); padding: 10px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .hole-label   { font-size: .63rem; color: var(--text-muted); font-weight: 600; }
    .hole-par-lbl { font-size: .6rem; color: var(--text-muted); }
    .hole-input {
      width: 100%; max-width: 48px; height: 40px;
      border: 2px solid var(--border-light); border-radius: 8px;
      background: var(--bg); color: var(--text);
      text-align: center; font-size: 1rem; font-weight: 600;
      outline: none; transition: border-color .15s, background .15s;
      -moz-appearance: textfield;
    }
    .hole-input::-webkit-inner-spin-button,
    .hole-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .hole-input:focus { border-color: var(--gold); }
    .hole-input.under { border-color: var(--green); background: var(--green-dim); }
    .hole-input.over  { border-color: var(--red);   background: var(--red-dim); }
    .hole-diff {
      font-size: .6rem; font-weight: 600; height: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .hole-diff.under { color: var(--green); }
    .hole-diff.over  { color: var(--red); }
    .hole-diff.eagle { color: var(--blue); }

    .sub-bar {
      padding: 8px 16px; display: flex; justify-content: flex-end; gap: 8px; align-items: center;
      border-top: 1px solid var(--border); background: var(--card-alt);
      font-size: .78rem; color: var(--text-muted);
    }
    .sub-bar span:last-child { font-weight: 600; color: var(--text); min-width: 28px; text-align: right; }

    .totals-row { display: grid; grid-template-columns: repeat(3,1fr); border-top: 1px solid var(--border); }
    .total-cell { padding: 16px; text-align: center; border-right: 1px solid var(--border); }
    .total-cell:last-child { border-right: none; }
    .total-label { font-size: .7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .total-value { font-size: 1.7rem; font-weight: 700; }
    .total-value.under { color: var(--green); }
    .total-value.over  { color: var(--red); }
    .total-value.even  { color: var(--text); }

    .actions { display: flex; gap: 10px; padding: 14px 20px; border-top: 1px solid var(--border); }
    .btn {
      padding: 10px 20px; border-radius: 8px; border: none;
      font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .18s;
    }
    .btn-primary { background: var(--gold); color: #0F1923; flex: 1; }
    .btn-primary:hover { background: #f0c96a; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 2px solid var(--border-light); }
    .btn-ghost:hover { border-color: var(--red); color: var(--red); }

    .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .history-title { font-size: 1rem; font-weight: 700; }

    .history-empty {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      text-align: center; padding: 32px; color: var(--text-muted); font-size: .85rem;
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 18px; display: flex; align-items: center; gap: 14px;
    }
    .history-date  { font-size: .73rem; color: var(--text-muted); min-width: 90px; line-height: 1.5; }
    .history-type  {
      font-size: .68rem; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
      background: var(--card-alt); padding: 3px 9px; border-radius: 20px; color: var(--text-muted); white-space: nowrap;
    }
    .history-holes { font-size: .8rem; color: var(--text-muted); flex: 1; }
    .history-score { font-size: 1.3rem; font-weight: 700; }
    .history-score.under { color: var(--green); }
    .history-score.over  { color: var(--red); }
    .history-diff  { font-size: .75rem; min-width: 46px; text-align: right; font-weight: 600; }
    .history-diff.under { color: var(--green); }
    .history-diff.over  { color: var(--red); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 50;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border: 1px solid var(--border-light);
      border-radius: var(--radius); padding: 28px 24px; max-width: 320px; width: 90%;
      box-shadow: var(--shadow); transform: translateY(10px); transition: transform .2s;
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
    .modal p  { font-size: .85rem; color: var(--text-muted); margin-bottom: 20px; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns .btn { flex: 1; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--gold); color: #0F1923; padding: 10px 24px; border-radius: 24px;
      font-size: .85rem; font-weight: 600; opacity: 0; pointer-events: none; transition: all .3s; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .holes-grid { grid-template-columns: repeat(6,1fr); }
      .mode-bar { flex-direction: column; }
    }
    @media (max-width: 400px) {
      .holes-grid { grid-template-columns: repeat(3,1fr); }
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-ball"></div>
  <div class="loader-text">⛳ Scorecard</div>
  <div class="loader-sub">Loading your round…</div>
</div>

<div class="modal-overlay" id="confirm-overlay">
  <div class="modal">
    <h3>Clear history?</h3>
    <p>This will permanently delete all saved rounds.</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="background:var(--red);color:#fff" onclick="confirmClearHistory()">Clear</button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <span class="header-icon">⛳</span>
    <h1>Scorecard</h1>
    <div class="header-date" id="header-date"></div>
  </header>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="pitch" onclick="setMode('pitch')">
      Pitch &amp; Putt<br><small style="font-weight:400;font-size:.72rem">18 holes · par 54</small>
    </button>
    <button class="mode-btn" data-mode="full" onclick="setMode('full')">
      Full Course<br><small style="font-weight:400;font-size:.72rem">18 holes · par 72</small>
    </button>
  </div>

  <main>
    <div class="card">
      <div class="card-header">
        <div class="card-title" id="card-title">Pitch &amp; Putt · 18 Holes</div>
        <div class="card-par"  id="card-par">Par 54</div>
      </div>
      <div id="holes-container"></div>
      <div class="totals-row">
        <div class="total-cell">
          <div class="total-label">Score</div>
          <div class="total-value" id="total-score">—</div>
        </div>
        <div class="total-cell">
          <div class="total-label">Par</div>
          <div class="total-value even" id="total-par">54</div>
        </div>
        <div class="total-cell">
          <div class="total-label">+/−</div>
          <div class="total-value" id="total-diff">—</div>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="saveRound()">💾 Save Round</button>
        <button class="btn btn-ghost" onclick="clearCard()">Clear</button>
      </div>
    </div>

    <div class="history-header">
      <div class="history-title">Past Rounds</div>
      <button class="btn btn-ghost" style="font-size:.75rem;padding:6px 14px" onclick="openModal()">Clear History</button>
    </div>
    <div id="history-container"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  const MODES = {
    pitch: { label:'Pitch & Putt · 18 Holes', par:54, holePar:3 },
    full:  { label:'Full Course · 18 Holes',  par:72, holePar:4 }
  };

  let currentMode = 'pitch';
  let scores = new Array(18).fill(null);

  // Show app immediately, loader fades out after 1s
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('en-CA', { weekday:'short', month:'short', day:'numeric' });
  buildGrid();
  renderHistory();

  setTimeout(function() {
    var loader = document.getElementById('loader');
    loader.classList.add('fade-out');
    setTimeout(function() { loader.style.display = 'none'; }, 500);
  }, 1000);

  function setMode(mode) {
    currentMode = mode;
    scores = new Array(18).fill(null);
    document.querySelectorAll('.mode-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
    var m = MODES[mode];
    document.getElementById('card-title').textContent = m.label;
    document.getElementById('card-par').textContent   = 'Par ' + m.par;
    document.getElementById('total-par').textContent  = m.par;
    buildGrid();
    updateTotals();
  }

  function buildGrid() {
    var m = MODES[currentMode];
    var container = document.getElementById('holes-container');
    container.innerHTML = '';
    for (var half = 0; half < 2; half++) {
      var grid = document.createElement('div');
      grid.className = 'holes-grid';
      for (var i = 0; i < 9; i++) {
        var idx = half * 9 + i;
        var cell = document.createElement('div');
        cell.className = 'hole-cell';
        cell.innerHTML =
          '<div class="hole-label">H'+(idx+1)+'</div>' +
          '<div class="hole-par-lbl">par '+m.holePar+'</div>' +
          '<input class="hole-input" id="hole-'+idx+'" type="number" min="1" max="20" placeholder="—"' +
          ' value="'+(scores[idx] !== null ? scores[idx] : '')+'"' +
          ' oninput="onHoleInput('+idx+', this)" />' +
          '<div class="hole-diff" id="diff-'+idx+'"></div>';
        grid.appendChild(cell);
      }
      container.appendChild(grid);
      var sub = document.createElement('div');
      sub.className = 'sub-bar';
      sub.innerHTML = '<span>'+(half===0?'Front 9':'Back 9')+'</span><span id="sub-'+half+'">—</span>';
      container.appendChild(sub);
    }
  }

  function onHoleInput(idx, el) {
    var val = el.value === '' ? null : Math.max(1, parseInt(el.value) || 1);
    scores[idx] = val;
    if (val !== null) el.value = val;

    var holePar = MODES[currentMode].holePar;
    var diffEl  = document.getElementById('diff-' + idx);
    el.classList.remove('under','over');
    diffEl.className = 'hole-diff';
    diffEl.textContent = '';

    if (val !== null) {
      var d = val - holePar;
      if      (d < -1) { el.classList.add('under'); diffEl.className='hole-diff eagle'; diffEl.textContent='Eagle'; }
      else if (d===-1) { el.classList.add('under'); diffEl.className='hole-diff under'; diffEl.textContent='Birdie'; }
      else if (d===0)  { diffEl.textContent='Par'; }
      else if (d===1)  { el.classList.add('over');  diffEl.className='hole-diff over';  diffEl.textContent='Bogey'; }
      else if (d===2)  { el.classList.add('over');  diffEl.className='hole-diff over';  diffEl.textContent='Dbl'; }
      else             { el.classList.add('over');  diffEl.className='hole-diff over';  diffEl.textContent='+'+d; }
    }
    updateTotals();
  }

  function updateTotals() {
    var m      = MODES[currentMode];
    var filled = scores.filter(function(s){ return s !== null; });
    var total  = filled.reduce(function(a,b){ return a+b; }, 0);
    var totalEl = document.getElementById('total-score');
    var diffEl  = document.getElementById('total-diff');
    document.getElementById('total-par').textContent = m.par;
    totalEl.className = 'total-value';
    diffEl.className  = 'total-value';

    if (filled.length === 0) {
      totalEl.textContent = '—';
      diffEl.textContent  = '—';
    } else {
      totalEl.textContent = total;
      var d = total - filled.length * m.holePar;
      diffEl.textContent = d===0 ? 'E' : (d>0 ? '+'+d : d);
      var cls = d<0 ? 'under' : d>0 ? 'over' : 'even';
      totalEl.classList.add(cls);
      diffEl.classList.add(cls);
    }

    for (var half = 0; half < 2; half++) {
      var sub = scores.slice(half*9, half*9+9).filter(function(s){ return s!==null; });
      document.getElementById('sub-'+half).textContent = sub.length ? sub.reduce(function(a,b){return a+b;},0) : '—';
    }
  }

  function saveRound() {
    var filled = scores.filter(function(s){ return s !== null; });
    if (filled.length === 0) { showToast('Enter at least one score first'); return; }
    var m     = MODES[currentMode];
    var total = filled.reduce(function(a,b){return a+b;},0);
    var history = getHistory();
    history.unshift({
      date: new Date().toISOString(),
      mode: currentMode,
      scores: scores.slice(),
      total: total,
      par: m.par,
      playedPar: filled.length * m.holePar,
      holes: filled.length
    });
    localStorage.setItem('scorecard_history', JSON.stringify(history));
    renderHistory();
    showToast('Round saved ✓');
  }

  function clearCard() {
    scores = new Array(18).fill(null);
    buildGrid();
    updateTotals();
  }

  function getHistory() {
    try { return JSON.parse(localStorage.getItem('scorecard_history')) || []; }
    catch(e) { return []; }
  }

  function renderHistory() {
    var history = getHistory();
    var el = document.getElementById('history-container');
    if (history.length === 0) {
      el.innerHTML = '<div class="history-empty">No rounds saved yet. Play a round and save it above.</div>';
      return;
    }
    var html = '<div class="history-list">';
    for (var i = 0; i < history.length; i++) {
      var r    = history[i];
      var d    = new Date(r.date);
      var ds   = d.toLocaleDateString('en-CA', {month:'short',day:'numeric',year:'numeric'});
      var ts   = d.toLocaleTimeString('en-CA', {hour:'2-digit',minute:'2-digit'});
      var diff = r.total - r.playedPar;
      var ds2  = diff===0 ? 'E' : (diff>0 ? '+'+diff : ''+diff);
      var cls  = diff<0 ? 'under' : diff>0 ? 'over' : '';
      var type = r.mode==='pitch' ? 'Pitch & Putt' : 'Full Course';
      html += '<div class="history-item">' +
        '<div class="history-date">'+ds+'<br><span style="font-size:.68rem">'+ts+'</span></div>' +
        '<div class="history-type">'+type+'</div>' +
        '<div class="history-holes">'+r.holes+'/18 holes</div>' +
        '<div class="history-score '+cls+'">'+r.total+'</div>' +
        '<div class="history-diff '+cls+'">'+ds2+'</div>' +
        '</div>';
    }
    html += '</div>';
    el.innerHTML = html;
  }

  function openModal()  { document.getElementById('confirm-overlay').classList.add('show'); }
  function closeModal() { document.getElementById('confirm-overlay').classList.remove('show'); }

  function confirmClearHistory() {
    localStorage.removeItem('scorecard_history');
    renderHistory();
    closeModal();
    showToast('History cleared');
  }

  document.getElementById('confirm-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  }
</script>
</body>
</html>
