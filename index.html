<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fairway — Golf Scorecard</title>
<style>
  :root{ --radius:14px; }

  /* ===== Themes (accent var name stays --green for compatibility) ===== */

  /* Fairway — dark green (default) */
  [data-theme="fairway"]{
    --bg:#0f1a14; --bg-glow:#1a2c20;
    --panel:#16241b; --panel-2:#1d2f23; --line:#2a4133;
    --green:#3ecf7c; --green-dim:#2a9d5f;
    --red:#f2665a; --amber:#f2c14e;
    --text:#eaf3ec; --muted:#8fa899;
    --shadow:0 4px 14px rgba(62,207,124,.3);
  }
  /* Midnight — dark blue/slate */
  [data-theme="midnight"]{
    --bg:#0d1017; --bg-glow:#161b28;
    --panel:#141924; --panel-2:#1c2333; --line:#2a3450;
    --green:#5b9dff; --green-dim:#3d78d6;
    --red:#f2665a; --amber:#f2c14e;
    --text:#e8edf7; --muted:#8b96ad;
    --shadow:0 4px 14px rgba(91,157,255,.28);
  }
  /* Light — clean white with green accent */
  [data-theme="light"]{
    --bg:#eef2ee; --bg-glow:#ffffff;
    --panel:#ffffff; --panel-2:#f2f6f2; --line:#dbe4dc;
    --green:#1f9d57; --green-dim:#178048;
    --red:#d8463c; --amber:#c78a12;
    --text:#16241b; --muted:#5f7267;
    --shadow:0 4px 14px rgba(31,157,87,.2);
  }
  /* Sand — warm light, links-course tones */
  [data-theme="sand"]{
    --bg:#efe7d6; --bg-glow:#fbf6ec;
    --panel:#fbf6ec; --panel-2:#f3ebda; --line:#e0d3ba;
    --green:#3f8f5e; --green-dim:#2f7049;
    --red:#c85a44; --amber:#c98a1f;
    --text:#3a3222; --muted:#867a5f;
    --shadow:0 4px 14px rgba(63,143,94,.2);
  }
  /* Mono — high-contrast grayscale */
  [data-theme="mono"]{
    --bg:#111111; --bg-glow:#1c1c1c;
    --panel:#181818; --panel-2:#222222; --line:#333333;
    --green:#e8e8e8; --green-dim:#bfbfbf;
    --red:#ff7a6d; --amber:#e0b64a;
    --text:#f4f4f4; --muted:#9a9a9a;
    --shadow:0 4px 14px rgba(255,255,255,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, var(--bg-glow), var(--bg));
    color:var(--text);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    transition:background .25s, color .25s;
  }
  .wrap{max-width:1000px;margin:0 auto;padding:24px 16px 80px}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{
    width:38px;height:38px;border-radius:11px;
    background:linear-gradient(145deg,var(--green),var(--green-dim));
    display:grid;place-items:center;font-size:20px;
    box-shadow:var(--shadow);
  }
  .brand h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
  .brand span{color:var(--muted);font-size:12px;display:block;font-weight:500;margin-top:-2px}
  .tabs{display:flex;gap:6px;background:var(--panel);padding:5px;border-radius:12px;border:1px solid var(--line)}
  .tab{
    border:none;background:none;color:var(--muted);font:inherit;font-weight:600;font-size:14px;
    padding:8px 16px;border-radius:8px;cursor:pointer;transition:.15s;
  }
  .tab.active{background:var(--panel-2);color:var(--text)}
  .tab:hover:not(.active){color:var(--text)}

  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;margin-bottom:18px;
    transition:background .25s, border-color .25s;
  }

  /* theme picker */
  .theme-picker{display:flex;align-items:center;gap:6px}
  .swatch{
    width:24px;height:24px;border-radius:50%;cursor:pointer;padding:0;
    border:2px solid transparent;transition:.15s;position:relative;
  }
  .swatch:hover{transform:scale(1.12)}
  .swatch.active{border-color:var(--text)}
  .swatch.active::after{
    content:'';position:absolute;inset:0;margin:auto;width:7px;height:7px;border-radius:50%;
    background:#fff;mix-blend-mode:difference;
  }
  .card h2{font-size:15px;font-weight:700;margin-bottom:14px;letter-spacing:-.2px}

  .row{display:flex;gap:10px;flex-wrap:wrap}
  input[type=text],input[type=number]{
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    font:inherit;padding:10px 12px;border-radius:10px;outline:none;transition:.15s;width:100%;
  }
  input:focus{border-color:var(--green-dim);box-shadow:0 0 0 3px rgba(62,207,124,.12)}
  input::placeholder{color:var(--muted)}
  .btn{
    border:none;font:inherit;font-weight:600;cursor:pointer;border-radius:10px;
    padding:10px 16px;transition:.15s;white-space:nowrap;
  }
  .btn-primary{background:var(--green);color:#06170d}
  .btn-primary:hover{background:#4bdd89}
  .btn-ghost{background:var(--panel-2);color:var(--text);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--muted)}
  .btn-danger{background:transparent;color:var(--red);border:1px solid transparent;padding:6px 10px;font-size:13px}
  .btn-danger:hover{background:rgba(242,102,90,.1)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  .player-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .chip{
    display:flex;align-items:center;gap:8px;background:var(--panel-2);
    border:1px solid var(--line);padding:6px 8px 6px 14px;border-radius:20px;font-size:14px;font-weight:600;
  }
  .chip button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0 2px}
  .chip button:hover{color:var(--red)}

  .empty{color:var(--muted);text-align:center;padding:32px 16px;font-size:14px}

  /* scorecard table */
  .scroll{overflow-x:auto;border-radius:12px;border:1px solid var(--line)}
  table{border-collapse:collapse;width:100%;min-width:640px;font-size:14px}
  th,td{padding:9px 8px;text-align:center;border-bottom:1px solid var(--line)}
  thead th{background:var(--panel-2);font-weight:600;color:var(--muted);font-size:12px;position:sticky;top:0}
  th.namecol,td.namecol{text-align:left;position:sticky;left:0;background:var(--panel);min-width:120px;font-weight:600;z-index:2}
  thead th.namecol{background:var(--panel-2);z-index:3}
  tbody tr:last-child td{border-bottom:none}
  td input{width:44px;padding:6px 4px;text-align:center;border-radius:8px}
  .totcol{background:var(--panel-2);font-weight:700}
  td.totcol{font-size:15px}
  .par-row td{color:var(--muted);font-size:12px;padding:6px 8px}

  /* status panel */
  .status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px}
  .stat{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .stat .label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .stat .big{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-top:4px}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .track-good{color:var(--green)}
  .track-bad{color:var(--red)}
  .track-close{color:var(--amber)}
  .pace-bar{height:6px;background:var(--line);border-radius:3px;margin-top:10px;overflow:hidden}
  .pace-fill{height:100%;border-radius:3px;transition:width .3s}

  .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}

  /* history */
  .hist-item{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
  .hist-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .hist-date{font-size:13px;color:var(--muted);font-weight:600}
  .hist-players{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .hist-player{display:flex;justify-content:space-between;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:14px;min-width:150px}
  .hist-player b{font-weight:700}
  .medal{color:var(--amber)}

  @media(max-width:520px){
    header{flex-direction:column;align-items:stretch}
    .tabs{width:100%}.tab{flex:1;text-align:center}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">⛳</div>
      <div>
        <h1>Fairway</h1>
        <span>Round scorecard &amp; tracker</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div class="theme-picker" id="themePicker" title="Theme"></div>
      <div class="tabs">
        <button class="tab active" data-tab="play">Round</button>
        <button class="tab" data-tab="history">History</button>
      </div>
    </div>
  </header>

  <!-- ROUND TAB -->
  <section id="tab-play">

    <div class="card" id="setup-card">
      <h2>Set up your round</h2>
      <div class="row">
        <input type="text" id="playerName" placeholder="Player name" maxlength="18"
               onkeydown="if(event.key==='Enter')addPlayer()">
        <button class="btn btn-primary" onclick="addPlayer()">Add player</button>
      </div>
      <div class="player-chips" id="chips"></div>
      <div class="actions">
        <button class="btn btn-primary" id="startBtn" onclick="startRound()" disabled>Start round</button>
      </div>
    </div>

    <div id="live" style="display:none">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
          <h2 style="margin:0">Scorecard</h2>
          <div style="font-size:13px;color:var(--muted)">Par 72 · 18 holes</div>
        </div>
        <div class="scroll" style="margin-top:14px">
          <table id="card"></table>
        </div>
      </div>

      <div class="card">
        <h2>Live standings</h2>
        <div class="status-grid" id="status"></div>
        <div class="actions">
          <button class="btn btn-primary" onclick="saveRound()">Save round to history</button>
          <button class="btn btn-ghost" onclick="newRound()">Discard &amp; new round</button>
        </div>
      </div>
    </div>
  </section>

  <!-- HISTORY TAB -->
  <section id="tab-history" style="display:none">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <h2 style="margin:0">Saved rounds</h2>
        <button class="btn btn-ghost" onclick="clearHistory()">Clear all</button>
      </div>
      <div id="histList" style="margin-top:14px"></div>
    </div>
  </section>
</div>

<script>
const PAR = 72, HOLES = 18, HOLE_PAR = PAR / HOLES; // 4 per hole
const STORE_KEY = 'fairway.history.v1';
const THEME_KEY = 'fairway.theme.v1';

/* ---------- themes ---------- */
const THEMES = [
  { id:'fairway',  name:'Fairway',  color:'#3ecf7c', bg:'#0f1a14' },
  { id:'midnight', name:'Midnight', color:'#5b9dff', bg:'#0d1017' },
  { id:'light',    name:'Light',    color:'#1f9d57', bg:'#eef2ee' },
  { id:'sand',     name:'Sand',     color:'#3f8f5e', bg:'#efe7d6' },
  { id:'mono',     name:'Mono',     color:'#bfbfbf', bg:'#111111' },
];
function applyTheme(id){
  document.documentElement.setAttribute('data-theme', id);
  try{ localStorage.setItem(THEME_KEY, id); }catch(e){}
  document.querySelectorAll('.swatch').forEach(s=>
    s.classList.toggle('active', s.dataset.theme === id));
}
function renderThemePicker(){
  const box = document.getElementById('themePicker');
  box.innerHTML = THEMES.map(t=>
    `<button class="swatch" data-theme="${t.id}" title="${t.name}"
       aria-label="${t.name} theme"
       style="background:${t.color};box-shadow:inset 0 0 0 8px ${t.bg}"
       onclick="applyTheme('${t.id}')"></button>`
  ).join('');
}
(function initTheme(){
  let saved = 'fairway';
  try{ saved = localStorage.getItem(THEME_KEY) || 'fairway'; }catch(e){}
  document.documentElement.setAttribute('data-theme', saved);
})();

let players = [];          // setup list of names
let round = null;          // { players:[{name, scores:[18]}] }

/* ---------- setup ---------- */
function addPlayer(){
  const inp = document.getElementById('playerName');
  const name = inp.value.trim();
  if(!name) return;
  if(players.length >= 8){ return; }
  players.push(name);
  inp.value=''; inp.focus();
  renderChips();
}
function removePlayer(i){ players.splice(i,1); renderChips(); }
function renderChips(){
  const box = document.getElementById('chips');
  box.innerHTML = players.map((p,i)=>
    `<span class="chip">${escapeHtml(p)}<button onclick="removePlayer(${i})" title="Remove">×</button></span>`
  ).join('');
  document.getElementById('startBtn').disabled = players.length === 0;
}

function startRound(){
  round = { players: players.map(n => ({ name:n, scores: Array(HOLES).fill(null) })) };
  document.getElementById('setup-card').style.display = 'none';
  document.getElementById('live').style.display = 'block';
  renderCard();
  renderStatus();
}

function newRound(){
  round = null; players = [];
  document.getElementById('playerName').value='';
  renderChips();
  document.getElementById('setup-card').style.display = 'block';
  document.getElementById('live').style.display = 'none';
}

/* ---------- scorecard ---------- */
function renderCard(){
  const t = document.getElementById('card');
  let head = '<thead><tr><th class="namecol">Player</th>';
  for(let h=1; h<=HOLES; h++) head += `<th>${h}</th>`;
  head += '<th class="totcol">Tot</th></tr>'
        + '<tr class="par-row"><td class="namecol">Par</td>'
        + Array(HOLES).fill(`<td>${HOLE_PAR}</td>`).join('')
        + `<td class="totcol">${PAR}</td></tr></thead>`;

  let body = '<tbody>';
  round.players.forEach((p, pi)=>{
    body += `<tr><td class="namecol">${escapeHtml(p.name)}</td>`;
    for(let h=0; h<HOLES; h++){
      const v = p.scores[h] ?? '';
      body += `<td><input type="number" min="1" max="15" inputmode="numeric"
                 value="${v}" onchange="setScore(${pi},${h},this.value)"></td>`;
    }
    body += `<td class="totcol" id="tot-${pi}">${totalOf(p)}</td></tr>`;
  });
  body += '</tbody>';
  t.innerHTML = head + body;
}

function setScore(pi, h, val){
  const n = parseInt(val,10);
  round.players[pi].scores[h] = (isNaN(n) || n<1) ? null : n;
  document.getElementById(`tot-${pi}`).textContent = totalOf(round.players[pi]);
  renderStatus();
}

function totalOf(p){ return p.scores.reduce((s,v)=> s + (v||0), 0); }
function holesPlayed(p){ return p.scores.filter(v=> v!=null).length; }

/* projected 18-hole score based on current pace */
function projected(p){
  const played = holesPlayed(p);
  if(played === 0) return null;
  return Math.round(totalOf(p) / played * HOLES);
}

/* ---------- live status ---------- */
function renderStatus(){
  const box = document.getElementById('status');
  // sort by total ascending (fewest strokes leads); unplayed go last-ish but still shown
  const ordered = round.players
    .map((p,i)=>({p,i}))
    .sort((a,b)=> totalOf(a.p) - totalOf(b.p));

  box.innerHTML = ordered.map(({p})=>{
    const played = holesPlayed(p);
    const tot = totalOf(p);
    const proj = projected(p);
    const parSoFar = played * HOLE_PAR;
    const rel = tot - parSoFar; // vs par at this point
    const relTxt = played===0 ? '—' : (rel===0 ? 'E' : (rel>0?`+${rel}`:`${rel}`));

    let trackCls='track-close', trackTxt='Even pace';
    if(proj!=null){
      if(proj < PAR){ trackCls='track-good'; trackTxt=`On track: ${proj}`; }
      else if(proj === PAR){ trackCls='track-close'; trackTxt='On track: 72'; }
      else { trackCls='track-bad'; trackTxt=`Off pace: ${proj}`; }
    } else { trackTxt='No holes yet'; }

    // pace bar: fill = played/18, colour by track
    const pct = Math.round(played/HOLES*100);
    const barColor = proj==null ? 'var(--muted)' :
                     proj<PAR ? 'var(--green)' : proj===PAR ? 'var(--amber)' : 'var(--red)';

    return `<div class="stat">
      <div class="label">${escapeHtml(p.name)}</div>
      <div class="big">${tot||0} <span style="font-size:14px;color:var(--muted);font-weight:600">strokes</span></div>
      <div class="sub">${played}/18 holes · <b style="color:${rel>0?'var(--red)':rel<0?'var(--green)':'var(--text)'}">${relTxt}</b> vs par</div>
      <div class="sub ${trackCls}" style="font-weight:700;margin-top:6px">${trackTxt}</div>
      <div class="pace-bar"><div class="pace-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>`;
  }).join('');
}

/* ---------- history / storage ---------- */
function loadHistory(){
  try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
  catch(e){ return []; }
}
function saveHistory(list){
  localStorage.setItem(STORE_KEY, JSON.stringify(list));
}

function saveRound(){
  const anyScore = round.players.some(p=> holesPlayed(p) > 0);
  if(!anyScore){ alert('Enter at least one score before saving.'); return; }
  const list = loadHistory();
  list.unshift({
    date: Date.now(),
    players: round.players.map(p=>({
      name: p.name, total: totalOf(p),
      played: holesPlayed(p), scores: p.scores.slice()
    }))
  });
  saveHistory(list);
  renderHistory();
  newRound();
  switchTab('history');
}

function renderHistory(){
  const list = loadHistory();
  const box = document.getElementById('histList');
  if(list.length === 0){
    box.innerHTML = '<div class="empty">No saved rounds yet. Play a round and save it here.</div>';
    return;
  }
  box.innerHTML = list.map((r, idx)=>{
    const finished = r.players.map(p=>({...p})).sort((a,b)=> a.total - b.total);
    const d = new Date(r.date);
    const dateStr = d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})
                    + ' · ' + d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
    const rows = finished.map((p,i)=>{
      const under = p.total < PAR && p.played === HOLES;
      return `<div class="hist-player">
        <span>${i===0?'<span class="medal">🏆</span> ':''}${escapeHtml(p.name)}</span>
        <b style="color:${under?'var(--green)':'var(--text)'}">${p.total}<span style="color:var(--muted);font-weight:500;font-size:12px"> (${p.played}/18)</span></b>
      </div>`;
    }).join('');
    return `<div class="hist-item">
      <div class="hist-head">
        <span class="hist-date">${dateStr}</span>
        <button class="btn btn-danger" onclick="deleteRound(${idx})">Delete</button>
      </div>
      <div class="hist-players">${rows}</div>
    </div>`;
  }).join('');
}

function deleteRound(idx){
  const list = loadHistory();
  list.splice(idx,1);
  saveHistory(list);
  renderHistory();
}
function clearHistory(){
  if(!confirm('Delete all saved rounds? This cannot be undone.')) return;
  saveHistory([]);
  renderHistory();
}

/* ---------- tabs ---------- */
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===name));
  document.getElementById('tab-play').style.display = name==='play' ? 'block':'none';
  document.getElementById('tab-history').style.display = name==='history' ? 'block':'none';
  if(name==='history') renderHistory();
}
document.querySelectorAll('.tab').forEach(t=> t.addEventListener('click', ()=>switchTab(t.dataset.tab)));

/* ---------- utils ---------- */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* init */
renderThemePicker();
applyTheme(document.documentElement.getAttribute('data-theme'));
renderChips();
</script>
</body>
</html>
